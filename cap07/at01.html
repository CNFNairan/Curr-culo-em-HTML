<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 Cap. 07 AT01 Cartão de Apresentação</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        text-align: center;
      }
      .cartao {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 2rem;
        max-width: 400px;
        margin: 3rem auto;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .cartao-nome {
        font-size: 2.2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 0.5rem;
      }
      .cartao-divisor {
        border: none;
        border-top: 2px dashed #3498db;
        margin: 1rem 0;
      }
      .cartao-cargo {
        font-style: italic;
        color: #7f8c8d;
        margin-bottom: 0.5rem;
      }
      .cartao-email {
        font-size: 0.9rem;
        color: #34495e;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AT01 - Cartão de Apresentação</h1>
      <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>
    <main>
      <article class="cartao">
        <h1 class="cartao-nome">Cauê Nairan Ferreira</h1>
        <hr class="cartao-divisor" />
        <p class="cartao-cargo">Estudante de Sistemas de Informação - IFAL</p>
        <p class="cartao-email">caue.nairan@gmail.com</p>
      </article>
    </main>
  </body>
</html>
