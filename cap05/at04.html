<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 AT04 - Inscrição em Evento</title>
  </head>
  <body>
    <header>
      <h1>Inscrição - Semana de Tecnologia IFAL</h1>
      <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>
    <main>
      <form
        action="https://httpbin.org/post"
        method="POST"
        enctype="multipart/form-data"
      >
        <fieldset>
          <legend>Identificação do Participante</legend>
          <div>
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required />
          </div>
          <div>
            <label for="email">E-mail institucional:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div>
            <label for="cidade">Cidade de origem:</label>
            <input type="text" id="cidade" name="cidade" list="lista-cidades" />
            <datalist id="lista-cidades">
              <option value="Maceió"></option>
              <option value="Arapiraca"></option>
              <option value="Rio Largo"></option>
              <option value="Palmeira dos Índios"></option>
              <option value="União dos Palmares"></option>
              <option value="Penedo"></option>
              <option value="São Miguel dos Campos"></option>
              <option value="Coruripe"></option>
            </datalist>
          </div>
          <div>
            <label for="foto">Foto para crachá:</label>
            <input
              type="file"
              id="foto"
              name="foto"
              accept="image/jpeg, image/png"
              aria-describedby="desc-foto"
            />
            <br /><small id="desc-foto"
              >Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small
            >
          </div>
        </fieldset>

        <fieldset>
          <legend>Preferências para o Evento</legend>
          <div>
            <label for="chegada">Data e hora preferida para chegada:</label>
            <input type="datetime-local" id="chegada" name="chegada" />
          </div>
          <div>
            <label for="experiencia"
              >Nível de experiência em programação:
              <span id="valor-experiencia">5</span>/10</label
            >
            <input
              type="range"
              id="experiencia"
              name="experiencia"
              min="0"
              max="10"
              step="1"
              value="5"
              oninput="
                document.getElementById('valor-experiencia').textContent =
                  this.value
              "
            />
          </div>
          <div>
            <label for="cor_camiseta"
              >Cor de preferência para a camiseta:</label
            >
            <input
              type="color"
              id="cor_camiseta"
              name="cor_camiseta"
              value="#1a73e8"
            />
          </div>
          <div>
            <label for="oficinas">Oficinas de interesse:</label>
            <select
              id="oficinas"
              name="oficinas[]"
              multiple
              size="4"
              aria-describedby="desc-oficinas"
            >
              <option value="html">HTML e CSS Avançado</option>
              <option value="js">JavaScript para Iniciantes</option>
              <option value="python">Análise de Dados com Python</option>
              <option value="git">Versionamento com Git</option>
              <option value="seg">Segurança em Aplicações Web</option>
            </select>
            <br /><small id="desc-oficinas"
              >Use Ctrl (ou Cmd no Mac) para selecionar mais de uma
              oficina.</small
            >
          </div>
        </fieldset>

        <input type="hidden" name="edicao" value="2026" />

        <div>
          <button type="submit">Confirmar inscrição</button>
        </div>
      </form>
    </main>
  </body>
</html>
